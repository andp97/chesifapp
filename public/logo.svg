<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="128" y1="128" x2="896" y2="896" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B8CFF"/>
      <stop offset="1" stop-color="#7B5CFF"/>
    </linearGradient>

    <linearGradient id="card" x1="260" y1="220" x2="760" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF0FF"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#2A3A80" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="232" y="220" width="560" height="584" rx="72" fill="url(#card)"/>
  </g>

  <!-- Calendar top bar -->
  <rect x="232" y="220" width="560" height="130" rx="72" fill="#2F54EB"/>
  <rect x="232" y="290" width="560" height="60" fill="#2F54EB"/>

  <!-- Calendar rings -->
  <rect x="340" y="150" width="52" height="120" rx="26" fill="#FFFFFF"/>
  <rect x="632" y="150" width="52" height="120" rx="26" fill="#FFFFFF"/>

  <!-- Event dots -->
  <circle cx="370" cy="455" r="28" fill="#5B8CFF"/>
  <circle cx="512" cy="455" r="28" fill="#5B8CFF"/>
  <circle cx="654" cy="455" r="28" fill="#5B8CFF"/>

  <circle cx="370" cy="565" r="28" fill="#5B8CFF"/>
  <circle cx="512" cy="565" r="28" fill="#5B8CFF"/>

  <!-- Participation check badge -->
  <circle cx="700" cy="690" r="96" fill="#22C55E"/>

  <path
    d="M654 690L688 724L750 658"
    stroke="white"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
